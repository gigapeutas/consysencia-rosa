<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema - Escola de Gestos</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" />
    <style>
        :root { --charcoal-bg: #1C2833; --phone-screen: #2C3E50; --gold-accent: #F1C40F; --slate-blue: #34495E; --ivory-white: #FDFEFE; }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; font-family: 'Open Sans', Arial, sans-serif; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--charcoal-bg); overflow: hidden; color: var(--ivory-white); }
        
        .tela-celular { display: flex; flex-direction: column; width: 100%; height: 100%; background-color: var(--phone-screen); position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .notch { width: 100px; height: 30px; background: #000; position: absolute; top: 0; left: 50%; transform: translateX(-50%); border-radius: 0 0 15px 15px; z-index: 50; }
        .status-bar { height: 40px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; font-size: 14px; color: var(--ivory-white); z-index: 40; position: relative; cursor: ns-resize; background: rgba(28, 40, 51, 0.8); }
        #cortina { position: absolute; top: -100%; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 30; transition: top 0.4s ease-out; display: flex; flex-direction: column; padding-top: 60px; }
        .painel-notificacao { background: var(--slate-blue); margin: 10px 15px; padding: 15px; border-radius: 15px; border-left: 4px solid #25D366; }

        /* PAINEL DE EVOLUÇÃO (Inspirado em image_17.png) */
        #painel-evolucao { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; display: none; padding: 20px; text-align: center;}
        .app-item { display: flex; flex-direction: column; align-items: center; gap: 8px; color: var(--ivory-white); font-size: 13px; font-weight: 600; }
        
        /* O "SQUIRCLE" EXATO DO REDMI A3 */
        .icon-box { width: 68px; height: 68px; display: flex; align-items: center; justify-content: center; border-radius: 22%; box-shadow: 0 6px 12px rgba(0,0,0,0.3); background-color: #fff; overflow: hidden; transition: transform 0.1s; }
        .balao-sistema { position: absolute; bottom: 80px; left: 5%; width: 90%; background: var(--slate-blue); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 2px solid var(--gold-accent); z-index: 20;}
        button.btn-principal { background-color: var(--slate-blue); color: var(--gold-accent); border: 2px solid var(--gold-accent); padding: 20px; font-size: 20px; font-weight: bold; border-radius: 50px; width: 100%; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="simulador" class="tela-celular">
        <div class="notch"></div>
        <div class="status-bar" id="barra-status"><span>10:30</span><div style="display: flex; gap: 5px;"><span class="material-symbols-outlined">wifi</span><span class="material-symbols-outlined">battery_full</span></div></div>

        <div id="cortina" onclick="fecharCortina()"><div class="painel-notificacao">WhatsApp: Filho mandou msg!</div></div>

        <div class="desktop" id="area-apps">
            <div class="app-item" onpointerdown="iniciarTap(event)" onpointerup="finalizarTap(event, 'Telefone')">
                <div class="icon-box" style="background-color: #4285F4;"><svg viewBox="0 0 24 24" fill="white" width="36" height="36"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg></div>
                <span>Telefone</span>
            </div>

            <div class="app-item" onpointerdown="iniciarTap(event)" onpointerup="finalizarTap(event, 'WhatsApp')">
                <div class="icon-box" style="background-image: url('icons/whatsapp.png'); background-size: cover;"></div>
                <span>WhatsApp</span>
            </div>

            <div class="app-item" onpointerdown="iniciarTap(event)" onpointerup="finalizarTap(event, 'Chrome')">
                <div class="icon-box" style="background-image: url('icons/chrome.png'); background-size: cover;"></div>
                <span>Chrome</span>
            </div>

            <div class="app-item" onpointerdown="iniciarTap(event)" onpointerup="finalizarTap(event, 'Câmera')">
                <div class="icon-box">
                    <svg viewBox="0 0 512 512" width="48" height="48">
                        <circle cx="256" cy="256" r="236" fill="#f2f2f2"/><circle cx="256" cy="256" r="140" fill="#5f6368"/><circle cx="256" cy="256" r="50" fill="#a0a0a0"/>
                    </svg>
                </div>
                <span>Câmera</span>
            </div>
        </div>

        <div id="painel-evolucao">
            <div style="font-size: 80px;">🏆</div>
            <h1 style="color: var(--gold-accent);">Conquistou o Módulo 1!</h1>
            <p>Você é Mestre dos Gestos Tácteis.</p>
            <button class="btn-principal" style="background-color: #25D366; color: white;" onclick="compartilharMedalhaZap()">Compartilhar Medalha</button>
            <button class="btn-principal" onclick="irCamera()">IR PARA CÂMERA ➔</button>
        </div>

        <div class="balao-sistema"><p id="texto-guia" style="font-size: 20px; margin: 0;"><b>Missão 1: Toque de Pluma.</b><br>Dê um toque rápido no Telefone.</p></div>
    </div>

    <script>
        let licaoAtual = 1;
        function falar(t) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'pt-BR'; window.speechSynthesis.speak(u); }
        window.onload = () => { setTimeout(() => falar("Missão 1. Dê um toque rápido no Telefone."), 500); };

        let tempoTap = 0;
        function iniciarTap(e) { tempoTap = Date.now(); e.currentTarget.querySelector('.icon-box').style.transform = "scale(0.9)"; }
        function finalizarTap(e, nome) {
            e.currentTarget.querySelector('.icon-box').style.transform = "scale(1)";
            if(licaoAtual !== 1 || nome !== 'Telefone') return; 

            const duracao = Date.now() - tempoTap;
            if (duracao > 500) falar("Segurou muito tempo! Tente ser mais rápido!");
            else { falar("Muito bem! Esse é o toque. Agora coloque o dedo no relógio lá em cima e puxe para baixo."); licaoAtual = 2; document.getElementById('texto-guia').innerHTML = "<b>Missão 2: Puxar a Cortina.</b><br>Arraste o relógio para baixo."; }
        }

        let inicioY = 0;
        const barra = document.getElementById('barra-status');
        barra.ontouchstart = (e) => { inicioY = e.touches[0].clientY; };
        barra.ontouchend = (e) => {
            if(licaoAtual !== 2) return;
            let fimY = e.changedTouches[0].clientY;
            let distancia = fimY - inicioY;
            if (distancia > 50) { document.getElementById('cortina').style.top = "0"; falar("Acesso liberado. Você abriu suas notificações. Toque para fechar."); } 
            else { falar("Não é só apertar. Tem que colocar o dedo e arrastar."); }
        };

        function fecharCortina() { 
            document.getElementById('cortina').style.top = "-100%"; 
            falar("Excelente. Evolução concluída! Você domina o sistema básico."); 
            licaoAtual = 3;
            setTimeout(() => {
                document.getElementById('area-apps').style.display = 'none';
                document.getElementById('painel-evolucao').style.display = 'flex';
                if (navigator.vibrate) navigator.vibrate([100, 100, 100, 100, 500]); // Celebração de evolução
            }, 1000);
        }

        function compartilharMedalhaZap() { window.open(`https://wa.me/?text=${encodeURIComponent('Acabei de evoluir! 🏆 Ganhei a Medalha de Mestre dos Gestos Básicos no ConSySenci.a.')}`, '_blank'); }
        function irCamera() { window.location.href='/camera/'; }
    </script>
</body>
</html>
