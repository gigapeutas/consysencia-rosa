<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rosa - Escola de Gestos</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" />
    <style>
        :root { --android-bg: #E3F2FD; --rosa-forte: #D81B60; }
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: Arial, sans-serif; background: #000; overflow: hidden; }

        .tela-celular { display: flex; flex-direction: column; width: 100%; height: 100%; background-color: var(--android-bg); position: relative; overflow: hidden; }
        .notch { width: 100px; height: 30px; background: #000; position: absolute; top: 0; left: 50%; transform: translateX(-50%); border-radius: 0 0 15px 15px; z-index: 50; }
        
        /* BARRA SENSÍVEL AO SWIPE (ONDE O IDOSO PUXA A CORTINA) */
        .status-bar { height: 40px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; font-size: 14px; z-index: 40; position: relative; cursor: ns-resize; }
        
        /* A CORTINA DE NOTIFICAÇÕES (Inicia oculta para cima) */
        #cortina { position: absolute; top: -100%; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 30; transition: top 0.4s ease-out; display: flex; flex-direction: column; padding-top: 50px; }
        .painel-notificacao { background: white; margin: 10px 15px; padding: 15px; border-radius: 15px; }

        .desktop { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 60px 20px; align-content: start; }
        .app-item { display: flex; flex-direction: column; align-items: center; gap: 8px; color: #333; font-size: 13px; font-weight: bold; }
        
        .icon-box { width: 68px; height: 68px; display: flex; align-items: center; justify-content: center; border-radius: 22%; box-shadow: 0 4px 8px rgba(0,0,0,0.1); background-color: #fff; overflow: hidden; }
        
        .balao-rosa { position: absolute; bottom: 80px; left: 5%; width: 90%; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border: 3px solid var(--rosa-forte); z-index: 20;}
        .nav-bar { height: 60px; background: rgba(255,255,255,0.9); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #ccc; position: absolute; bottom: 0; width: 100%; z-index: 40;}
    </style>
</head>
<body>

    <div id="simulador" class="tela-celular">
        <div class="notch"></div>
        
        <div class="status-bar" id="barra-status">
            <span>10:30</span>
            <div style="display: flex; gap: 5px;"><span class="material-symbols-outlined" style="font-size: 18px;">wifi</span><span class="material-symbols-outlined" style="font-size: 18px;">battery_full</span></div>
        </div>

        <div id="cortina" onclick="fecharCortina()"><div class="painel-notificacao">WhatsApp: Filho mandou msg!</div><p style="color: white; text-align: center;">Toque para fechar</p></div>

        <div class="desktop">
            <div class="app-item" onpointerdown="iniciarTap(event)" onpointerup="finalizarTap(event, 'Telefone')">
                <div class="icon-box" style="background-color: #4285F4;"><svg viewBox="0 0 24 24" fill="white" width="36" height="36"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg></div>
                <span>Telefone</span>
            </div>

            <div class="app-item"><div class="icon-box" style="background-image: url('icons/whatsapp.png'); background-size: cover;"></div><span>WhatsApp</span></div>

            <div class="app-item"><div class="icon-box" style="background-image: url('icons/chrome.png'); background-size: cover;"></div><span>Chrome</span></div>

            <div class="app-item" onpointerdown="iniciarTap(event)" onpointerup="finalizarTap(event, 'Câmera')">
                <div class="icon-box">
                    <svg viewBox="0 0 512 512" width="48" height="48">
                        <circle cx="256" cy="256" r="236" fill="#f2f2f2"/><circle cx="256" cy="256" r="140" fill="#5f6368"/><circle cx="256" cy="256" r="50" fill="#a0a0a0"/>
                    </svg>
                </div>
                <span>Câmera</span>
            </div>
        </div>

        <div class="balao-rosa"><p id="texto-guia" style="font-size: 20px; margin: 0;"><b>Lição 1: Toque de Pluma.</b><br>Dê um toque rápido no Telefone!</p></div>
        <div class="nav-bar"><span class="material-symbols-outlined nav-btn">arrow_back_ios</span><span class="material-symbols-outlined nav-btn">circle</span><span class="material-symbols-outlined nav-btn">check_box_outline_blank</span></div>
    </div>

    <script>
        let licaoAtual = 1;

        function falar(t) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'pt-BR'; window.speechSynthesis.speak(u); }
        window.onload = () => { setTimeout(() => falar("Dê um toque rápido no Telefone!"), 500); };

        // === FÍSICA DO TOQUE (TAP) ===
        let tempoTap = 0;
        function iniciarTap(e) { tempoTap = Date.now(); e.currentTarget.querySelector('.icon-box').style.transform = "scale(0.9)"; }
        function finalizarTap(e, nome) {
            e.currentTarget.querySelector('.icon-box').style.transform = "scale(1)";
            if(licaoAtual !== 1 || nome !== 'Telefone') return; // Só avalia toque rápido no Telefone

            const duracao = Date.now() - tempoTap;
            if (duracao > 500) falar("Segurou muito tempo! Tente ser mais rápido!");
            else { falar("Muito bem! Esse é o toque. Agora coloque o dedo lá em cima no relógio e puxe para baixo."); licaoAtual = 2; document.getElementById('texto-guia').innerHTML = "<b>Lição 2: Puxar a Cortina.</b><br>Coloque o dedo no relógio e puxe a tela para baixo."; }
        }

        // === FÍSICA DO ARRASTO (SWIPE) ===
        let inicioY = 0;
        const barra = document.getElementById('barra-status');
        barra.ontouchstart = (e) => { inicioY = e.touches[0].clientY; };
        barra.ontouchend = (e) => {
            if(licaoAtual !== 2) return;
            let fimY = e.changedTouches[0].clientY;
            let distancia = fimY - inicioY;
            
            if (distancia > 50) { document.getElementById('cortina').style.top = "0"; falar("Isso! Você abriu a cortina de avisos."); } 
            else { falar("Não é só apertar. Tem que colocar o dedo e arrastar."); }
        };

        function fecharCortina() { document.getElementById('cortina').style.top = "-100%"; falar("Excelente. Você concluiu os gestos básicos! Mande para sua família!"); }
    </script>
</body>
</html>
