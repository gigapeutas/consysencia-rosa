<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador UAU</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>
:root{
--bg:#121212;
--rosa:#D81B60;
--verde:#2ECC71;
}

body{
margin:0;
background:var(--bg);
color:white;
font-family:Arial;
overflow:hidden;
}

/* TELAS */
.tela{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}
.tela.ativa{display:flex;}

/* BOTÃO */
button{
padding:15px 25px;
border:none;
border-radius:30px;
background:var(--verde);
font-weight:bold;
font-size:18px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:20px;
}

.app{
display:flex;
flex-direction:column;
align-items:center;
}

.icon{
width:65px;
height:65px;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
background:#444;
position:relative;
overflow:hidden;
}

/* RIPPLE */
.ripple{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.5);
transform:scale(0);
animation:ripple 0.5s linear;
}

@keyframes ripple{
to{transform:scale(4);opacity:0;}
}

/* PULSO */
.pulso{
position:absolute;
width:80px;
height:80px;
border-radius:50%;
border:3px solid var(--rosa);
animation:pulse 1.5s infinite;
pointer-events:none;
}

@keyframes pulse{
0%{transform:scale(0.8);opacity:1;}
70%{transform:scale(1.5);opacity:0;}
100%{opacity:0;}
}

/* CORTINA */
#cortina{
position:absolute;
top:-100%;
left:0;
width:100%;
height:100%;
background:#222;
transition:top .2s;
}

.status{
background:#000;
padding:10px;
text-align:center;
}

/* CÂMERA */
.camera{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:url('https://images.unsplash.com/photo-1558522195-e1201b090344?q=80&w=600') center/cover;
filter:blur(8px);
transition:.3s;
}

.foco{filter:blur(0);}

.disparo{
width:70px;
height:70px;
background:white;
border-radius:50%;
margin:20px;
}

</style>
</head>

<body>

<div id="inicio" class="tela ativa">
<h1>Vamos aprender juntas</h1>
<button onclick="start()">COMEÇAR</button>
</div>

<div id="home" class="tela">
<div class="status" id="status">Arraste para baixo</div>

<div id="cortina"></div>

<div class="grid">

<div class="app" onclick="tap(event,'telefone')">
<div class="icon" id="telefone" style="background:#4285F4;">
<span class="material-symbols-outlined">call</span>
</div>
<span>Telefone</span>
</div>

<div class="app" onclick="tap(event,'camera')">
<div class="icon" id="camera" style="background:#2ECC71;">
<span class="material-symbols-outlined">photo_camera</span>
</div>
<span>Câmera</span>
</div>

</div>
</div>

<div id="cam" class="tela">
<div class="camera" id="camview" onclick="focar()"></div>
<div class="disparo" onclick="foto()"></div>
</div>

<div id="final" class="tela">
<h1>🎓 Você conseguiu!</h1>
<button onclick="location.reload()">REINICIAR</button>
</div>

<script>

let estado = "inicio";

/* VOZ */
function falar(t){
let u = new SpeechSynthesisUtterance(t);
u.lang="pt-BR";
speechSynthesis.speak(u);
}

/* PULSO */
function pulso(el){
removePulso();
let r = el.getBoundingClientRect();

let p = document.createElement("div");
p.className="pulso";
p.style.left = (r.left + r.width/2 - 40)+"px";
p.style.top = (r.top + r.height/2 - 40)+"px";

document.body.appendChild(p);
}

function removePulso(){
let p=document.querySelector(".pulso");
if(p)p.remove();
}

/* RIPPLE */
function ripple(e){
let c = document.createElement("span");
c.className="ripple";
let d = Math.max(e.target.clientWidth,e.target.clientHeight);
c.style.width=c.style.height=d+"px";
c.style.left=e.offsetX-d/2+"px";
c.style.top=e.offsetY-d/2+"px";
e.target.appendChild(c);
setTimeout(()=>c.remove(),500);
}

/* START */
function start(){
go("home");
setTimeout(()=>{
pulso(document.getElementById("telefone"));
falar("Toque no telefone azul");
estado="telefone";
},800);
}

/* TAP */
function tap(e,app){
ripple(e);

if(estado==="telefone"){
if(app==="telefone"){
removePulso();
falar("Muito bem!");
estado="camera";
setTimeout(()=>{
pulso(document.getElementById("camera"));
falar("Agora toque na câmera");
},1000);
}else{
erro();
}
}

else if(estado==="camera"){
if(app==="camera"){
removePulso();
go("cam");
setTimeout(()=>{
falar("Toque na imagem para focar");
},500);
estado="foco";
}else erro();
}

}

/* ERRO */
function erro(){
falar("Esse não é o botão certo");
navigator.vibrate && navigator.vibrate([100,50,100]);
}

/* TROCAR TELA */
function go(id){
document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativa"));
document.getElementById(id).classList.add("ativa");
}

/* CAMERA */
function focar(){
if(estado!=="foco")return;
document.getElementById("camview").classList.add("foco");
falar("Agora tire a foto");
estado="foto";
}

function foto(){
if(estado!=="foto")return;
falar("Foto tirada!");
setTimeout(()=>{
go("final");
falar("Parabéns!");
},1000);
}

</script>

</body>
</html>
