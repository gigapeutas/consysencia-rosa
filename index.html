<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>
body{
margin:0;
background:#000;
font-family:sans-serif;
overflow:hidden;
}

/* CONTAINER CELULAR */
.phone{
width:100%;
height:100vh;
background:#111;
position:relative;
overflow:hidden;
}

/* STATUS */
.status{
height:40px;
background:#000;
display:flex;
align-items:center;
justify-content:center;
color:#fff;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:20px;
}

.app{
text-align:center;
color:#fff;
}

.icon{
width:65px;
height:65px;
background:#333;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
position:relative;
overflow:hidden;
}

/* PULSO */
.pulse{
position:absolute;
width:90px;
height:90px;
border:3px solid #ff2d7a;
border-radius:50%;
animation:pulse 1.5s infinite;
pointer-events:none;
}

@keyframes pulse{
0%{transform:scale(0.7);opacity:1;}
100%{transform:scale(1.6);opacity:0;}
}

/* RIPPLE */
.ripple{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.5);
transform:scale(0);
animation:ripple 0.5s;
}

@keyframes ripple{
to{transform:scale(4);opacity:0;}
}

/* CORTINA REAL */
.curtain{
position:absolute;
top:-100%;
left:0;
width:100%;
height:100%;
background:#222;
transition:top .3s;
}

/* CAMERA */
.camera{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:url('https://images.unsplash.com/photo-1558522195-e1201b090344?q=80&w=600') center/cover;
filter:blur(8px);
transition:.4s;
}

.focus{
filter:blur(0);
}

</style>
</head>

<body>

<div class="phone">

<div class="status" id="status">Arraste para baixo</div>

<div id="curtain" class="curtain"></div>

<div class="grid">

<div class="app" onclick="tap(event,'tel')">
<div class="icon" id="tel" style="background:#4285F4">
<span class="material-symbols-outlined">call</span>
</div>
Telefone
</div>

<div class="app" onclick="tap(event,'cam')">
<div class="icon" id="cam" style="background:#2ECC71">
<span class="material-symbols-outlined">photo_camera</span>
</div>
Câmera
</div>

</div>

</div>

<script>

/* VOZ */
function falar(t){
speechSynthesis.cancel();
let u=new SpeechSynthesisUtterance(t);
u.lang="pt-BR";
speechSynthesis.speak(u);
}

/* PULSO */
function pulse(el){
removePulse();
let r=el.getBoundingClientRect();
let p=document.createElement("div");
p.className="pulse";
p.style.left=(r.left+r.width/2-45)+"px";
p.style.top=(r.top+r.height/2-45)+"px";
document.body.appendChild(p);
}

function removePulse(){
let p=document.querySelector(".pulse");
if(p)p.remove();
}

/* RIPPLE */
function ripple(e){
let c=document.createElement("span");
c.className="ripple";
let d=Math.max(e.target.clientWidth,e.target.clientHeight);
c.style.width=c.style.height=d+"px";
c.style.left=e.offsetX-d/2+"px";
c.style.top=e.offsetY-d/2+"px";
e.target.appendChild(c);
setTimeout(()=>c.remove(),500);
}

/* ESTADO */
let estado="inicio";

/* START */
setTimeout(()=>{
pulse(document.getElementById("tel"));
falar("Toque no telefone azul");
estado="tel";
},1000);

/* TAP */
function tap(e,app){
ripple(e);

if(app!==estado){
navigator.vibrate && navigator.vibrate([100,50,100]);
falar("Esse não é o correto");
return;
}

removePulse();

if(app==="tel"){
falar("Perfeito!");
estado="cam";

setTimeout(()=>{
pulse(document.getElementById("cam"));
falar("Agora toque na câmera");
},800);
}

else if(app==="cam"){
falar("Abrindo câmera...");
abrirCamera();
}
}

/* CAMERA */
function abrirCamera(){
let cam=document.createElement("div");
cam.className="camera";
document.body.appendChild(cam);

setTimeout(()=>{
falar("Toque para focar");
cam.onclick=()=>{
cam.classList.add("focus");
falar("Muito bem!");
};
},800);
}

/* CORTINA REAL */
let startY=0;
let curtain=document.getElementById("curtain");

document.getElementById("status").addEventListener("touchstart",(e)=>{
startY=e.touches[0].clientY;
});

document.getElementById("status").addEventListener("touchmove",(e)=>{
let y=e.touches[0].clientY;
let diff=y-startY;

if(diff>0){
curtain.style.top=(-100+diff/2)+"%";
}
});

document.getElementById("status").addEventListener("touchend",(e)=>{
let y=e.changedTouches[0].clientY;

if(y-startY>120){
curtain.style.top="0%";
falar("Aqui ficam as notificações");
}else{
curtain.style.top="-100%";
}
});

</script>

</body>
</html>
