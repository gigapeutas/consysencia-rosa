<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>ConSySenci.a Rosa — Módulo 0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root {
  --void:#000;--surf:#0A0A0A;--neon:#39FF14;--neon-d:rgba(57,255,20,.15);
  --neon-g:rgba(57,255,20,.45);--neon-m:rgba(57,255,20,.30);
  --w:#FFF;--gh:#E0E0E0;--gm:#888;--gl:#2A2A2A;--danger:#FF4444;
  --pw:360px;--ph:780px;--pr:48px;--pbl:#1A1A1E;--pb2:#0D0D0F;
  --pbn:#222228;--pbh:#333340;
  --fn:'Nunito','Segoe UI',sans-serif;--fnd:'Oswald','Impact',sans-serif;
  --du:150ms;--df:300ms;--dn:600ms;--ds:900ms;--dvs:1500ms;
  --eo:cubic-bezier(.16,1,.3,1);--eio:cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;touch-action:manipulation;}
body{height:100%;background:var(--void);font-family:var(--fn);color:var(--w);display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;user-select:none;-webkit-user-select:none;}

/* ── INSTRUCTOR LAYER ── */
#instructor-layer{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:28px;z-index:100;pointer-events:none;}
.instructor-bubble{background:rgba(10,10,10,.93);border:1.5px solid var(--neon-m);border-radius:20px;padding:16px 22px;max-width:340px;text-align:center;box-shadow:0 0 24px var(--neon-d),0 8px 32px rgba(0,0,0,.7);pointer-events:none;opacity:0;transform:translateY(12px);transition:opacity var(--dn) var(--eo),transform var(--dn) var(--eo);}
.instructor-bubble.visible{opacity:1;transform:translateY(0);}
.instructor-bubble p{font-size:22px;font-weight:700;line-height:1.55;color:var(--gh);}
.instructor-bubble p strong{color:var(--neon);}
.instructor-arrow{display:flex;flex-direction:column;align-items:center;gap:4px;margin-bottom:10px;animation:arrowB 1.2s var(--eio) infinite;}
.instructor-arrow span{display:block;width:8px;height:8px;border-right:3px solid var(--neon);border-bottom:3px solid var(--neon);transform:rotate(45deg);opacity:.9;}
.instructor-arrow span:nth-child(2){opacity:.5;margin-top:-4px;}
@keyframes arrowB{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* ── SIMULATOR WRAPPER ── */
#sim-wrap{position:relative;display:flex;align-items:center;justify-content:center;transform-origin:center center;}

/* ── PHONE FRAME ── */
#phone-frame{position:relative;width:var(--pw);height:var(--ph);border-radius:var(--pr);background:linear-gradient(160deg,var(--pbl) 0%,#222228 40%,#151518 70%,var(--pb2) 100%);box-shadow:0 0 0 1px rgba(255,255,255,.07),0 0 0 2px rgba(0,0,0,.8),0 20px 60px rgba(0,0,0,.9),0 4px 12px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.06);flex-shrink:0;}
#phone-frame::before{content:'';position:absolute;top:18px;left:50%;transform:translateX(-50%);width:12px;height:12px;background:#0A0A0C;border-radius:50%;box-shadow:0 0 0 2px rgba(255,255,255,.04),inset 0 0 4px rgba(0,0,0,.9);z-index:10;}
#phone-frame::after{content:'';position:absolute;top:20px;left:50%;transform:translateX(-50%);width:48px;height:4px;margin-top:-2px;margin-left:12px;background:rgba(255,255,255,.04);border-radius:2px;}

/* ── BOTÕES LATERAIS ── */
.btn-vol{position:absolute;left:-4px;border-radius:3px 0 0 3px;background:linear-gradient(90deg,#111114,var(--pbn));box-shadow:-2px 0 4px rgba(0,0,0,.5);}
.btn-vol-up{top:150px;width:4px;height:52px;}
.btn-vol-dn{top:216px;width:4px;height:52px;}

/* ── BOTÃO POWER ── */
#btn-power{position:absolute;right:-5px;top:160px;width:5px;height:72px;border-radius:0 4px 4px 0;background:linear-gradient(270deg,var(--pbh) 0%,var(--pbn) 60%,#111114 100%);box-shadow:3px 0 6px rgba(0,0,0,.6);cursor:pointer;padding:12px 22px 12px 8px;margin:-12px -22px -12px -8px;transition:background var(--df) var(--eo),box-shadow var(--df) var(--eo);z-index:50;touch-action:none;}
#btn-power.idle{animation:pwrPulse 2s var(--eio) infinite;}
@keyframes pwrPulse{0%,100%{box-shadow:3px 0 6px rgba(0,0,0,.6),4px 0 0 var(--neon-d)}50%{box-shadow:3px 0 10px rgba(0,0,0,.6),6px 0 14px var(--neon-g)}}
#btn-power.pressing{background:linear-gradient(270deg,#55FF40 0%,#2A8A20 60%,#111114 100%);box-shadow:3px 0 8px rgba(0,0,0,.6),5px 0 18px var(--neon-g),8px 0 28px var(--neon-d);animation:none;}
#btn-power.locked{pointer-events:none;animation:none;}

/* ── TELA ── */
#phone-screen{position:absolute;top:12px;left:12px;right:12px;bottom:12px;border-radius:calc(var(--pr) - 12px);background:var(--void);overflow:hidden;box-shadow:inset 0 0 0 1px rgba(255,255,255,.03);}

/* ── CAMADAS DE ESTADO ── */
.slayer{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity var(--dn) var(--eo);}
.slayer.active{opacity:1;pointer-events:auto;}

/* TELA OFF */
#s-off{background:var(--void);}
#s-off::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 40% at 30% 20%,rgba(255,255,255,.012) 0%,transparent 70%);pointer-events:none;}

/* TELA BOOT */
#s-boot{background:var(--void);gap:0;}
.boot-logo{display:flex;flex-direction:column;align-items:center;gap:12px;opacity:0;transform:scale(.92);transition:opacity var(--dvs) var(--eo),transform var(--dvs) var(--eo);}
.boot-logo.vis{opacity:1;transform:scale(1);}
.boot-icon{font-size:64px;line-height:1;filter:drop-shadow(0 0 20px var(--neon-g));animation:iconF 3s var(--eio) infinite;}
@keyframes iconF{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.boot-txt{font-family:var(--fnd);font-size:28px;letter-spacing:2px;color:var(--neon);text-shadow:0 0 10px var(--neon-g),0 0 30px var(--neon-d);}
.boot-sub{font-size:13px;color:var(--gm);letter-spacing:4px;text-transform:uppercase;margin-top:-6px;}
.boot-prog-wrap{position:absolute;bottom:80px;left:48px;right:48px;display:flex;flex-direction:column;align-items:center;gap:12px;opacity:0;transition:opacity var(--dn) var(--eo);}
.boot-prog-wrap.vis{opacity:1;}
.boot-track{width:100%;height:3px;background:var(--gl);border-radius:2px;overflow:hidden;}
.boot-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--neon),#80FF60);border-radius:2px;box-shadow:0 0 8px var(--neon-g);transition:width var(--dn) linear;}
.boot-lbl{font-size:13px;color:var(--gm);letter-spacing:1px;}

/* TELA WELCOME */
#s-welcome{background:var(--void);padding:40px 32px;gap:28px;text-align:center;}
.wlc-icon{font-size:72px;line-height:1;filter:drop-shadow(0 0 16px var(--neon-g));animation:iconF 4s var(--eio) infinite;}
.wlc-h{font-family:var(--fnd);font-size:40px;color:var(--neon);letter-spacing:1px;text-shadow:0 0 20px var(--neon-g);line-height:1.15;}
.wlc-p{font-size:22px;font-weight:600;color:var(--gh);line-height:1.65;max-width:280px;}
.wlc-p strong{color:var(--neon);}
#btn-next{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;min-height:64px;background:var(--neon);color:var(--void);font-family:var(--fn);font-size:26px;font-weight:900;border:none;border-radius:18px;cursor:pointer;letter-spacing:.5px;box-shadow:0 6px 24px rgba(57,255,20,.4);transition:transform var(--df) var(--eo),box-shadow var(--df) var(--eo);touch-action:manipulation;animation:btnP 2.5s var(--eio) infinite;}
@keyframes btnP{0%,100%{box-shadow:0 0 0 0 var(--neon-g),0 6px 24px rgba(57,255,20,.4)}50%{box-shadow:0 0 0 8px transparent,0 6px 32px rgba(57,255,20,.55)}}
#btn-next:active{transform:scale(.96);box-shadow:0 2px 12px rgba(57,255,20,.3);animation:none;}

/* FEEDBACK OVERLAY */
#feedback-ov{position:absolute;bottom:32px;left:16px;right:16px;background:rgba(255,68,68,.12);border:1.5px solid rgba(255,68,68,.4);border-radius:14px;padding:14px 18px;text-align:center;font-size:16px;font-weight:700;color:#FF8080;opacity:0;transform:translateY(8px);transition:opacity var(--df) var(--eo),transform var(--df) var(--eo);pointer-events:none;z-index:20;}
#feedback-ov.vis{opacity:1;transform:translateY(0);}

/* LONG-PRESS INDICATOR */
#lp-ind{position:absolute;right:18px;top:130px;width:24px;height:100px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:0;opacity:0;transition:opacity var(--df);z-index:15;pointer-events:none;}
#lp-ind.vis{opacity:1;}
.lp-track{width:4px;height:72px;background:var(--gl);border-radius:2px;overflow:hidden;position:relative;}
.lp-fill{position:absolute;bottom:0;left:0;right:0;height:0%;background:linear-gradient(0deg,var(--neon),#60FF40);border-radius:2px;box-shadow:0 0 6px var(--neon-g);}
.lp-lbl{font-size:9px;color:var(--gm);letter-spacing:.5px;margin-top:5px;text-transform:uppercase;}

/* HAPTIC */
@keyframes hapticShake{0%{transform:translateX(0)}20%{transform:translateX(-3px)}40%{transform:translateX(3px)}60%{transform:translateX(-2px)}80%{transform:translateX(2px)}100%{transform:translateX(0)}}
.haptic{animation:hapticShake .35s var(--eo);}

/* RESPONSIVE */
@media(max-height:820px){#sim-wrap{transform:scale(.88)}}
@media(max-height:700px){#sim-wrap{transform:scale(.75)}}
@media(max-height:600px){#sim-wrap{transform:scale(.65)}}
@media(max-width:400px){#sim-wrap{transform:scale(.94)}}
@media(max-width:370px){#sim-wrap{transform:scale(.85)}}
@media(max-height:480px) and (orientation:landscape){#sim-wrap{transform:scale(.55)}.instructor-bubble p{font-size:18px;}}
#btn-power:focus-visible,#btn-next:focus-visible{outline:3px solid var(--neon);outline-offset:4px;}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:300ms!important;}}
</style>
</head>
<body>

<aside id="instructor-layer" aria-live="polite" aria-atomic="true">
  <div class="instructor-bubble" id="bubble" role="status">
    <div class="instructor-arrow" id="arrow" aria-hidden="true">
      <span></span><span></span>
    </div>
    <p id="bubble-txt">
      Toque e <strong>segure</strong> o botão lateral por <strong>3 segundos</strong> para ligar
    </p>
  </div>
</aside>

<main id="sim-wrap" role="application" aria-label="Simulador de smartphone">
  <div id="phone-frame" role="img" aria-label="Smartphone simulado">

    <div class="btn-vol btn-vol-up" aria-hidden="true"></div>
    <div class="btn-vol btn-vol-dn" aria-hidden="true"></div>

    <div id="btn-power" class="idle"
         role="button" tabindex="0"
         aria-label="Botão Power — Toque e segure por 3 segundos para ligar"
         aria-pressed="false">
    </div>

    <div id="lp-ind" aria-hidden="true">
      <div class="lp-track"><div class="lp-fill" id="lp-fill"></div></div>
      <span class="lp-lbl">3s</span>
    </div>

    <div id="phone-screen">

      <section id="s-off" class="slayer active" aria-label="Tela apagada"></section>

      <section id="s-boot" class="slayer" aria-label="Celular ligando">
        <div class="boot-logo" id="boot-logo">
          <div class="boot-icon">🌹</div>
          <div class="boot-txt">ConSySenci.a</div>
          <div class="boot-sub">Rosa</div>
        </div>
        <div class="boot-prog-wrap" id="boot-prog">
          <div class="boot-track">
            <div class="boot-fill" id="boot-fill"></div>
          </div>
          <span class="boot-lbl" id="boot-lbl">Carregando... 0%</span>
        </div>
      </section>

      <section id="s-welcome" class="slayer" aria-label="Boas-vindas">
        <div class="wlc-icon">🌟</div>
        <h1 class="wlc-h">Celular<br>Ligado!</h1>
        <p class="wlc-p">Você fez seu primeiro passo.<br><strong>Isso é aprender!</strong></p>
        <button id="btn-next" type="button">
          <span>Próximo</span>
          <span aria-hidden="true">→</span>
        </button>
      </section>

      <div id="feedback-ov" role="alert" aria-live="assertive"></div>

    </div>
  </div>
</main>

<script>
/* ─────────────────────────────────────────────────────────────
   ConSySenci.a Rosa — Módulo 0 (Single-File Build)
   © 2026 ConSySenci.a — Todos os direitos reservados
───────────────────────────────────────────────────────────────
   ARQUITETURA MODULAR (inline por necessidade de single-file):
   1. STATE  — Máquina de estados finitos
   2. UI     — DOM, transições, boot sequence
   3. INPUT  — Long-press detection via rAF
   4. BOOT   — Bootstrap e wiring
──────────────────────────────────────────────────────────────*/
'use strict';

/* ══════════════════════════════════════════════════════════
   1. STATE MACHINE
══════════════════════════════════════════════════════════ */
const FSM = (() => {
  const S = Object.freeze({ OFF:'OFF', PRESSING:'PRESSING', BOOTING:'BOOTING', WELCOME:'WELCOME' });
  const T = { OFF:['PRESSING'], PRESSING:['OFF','BOOTING'], BOOTING:['WELCOME'], WELCOME:[] };
  let cur = S.OFF, prev = null;
  const listeners = new Map(), global = [];

  const is    = s => cur === s;
  const get   = ()  => cur;
  const go    = (next) => {
    if (!T[cur].includes(next)) return false;
    prev = cur; cur = next;
    (listeners.get(next)||[]).forEach(fn => fn({ from:prev, to:cur }));
    global.forEach(fn => fn({ from:prev, to:cur }));
    return true;
  };
  const onEnter  = (s,fn) => { if(!listeners.has(s)) listeners.set(s,[]); listeners.get(s).push(fn); };
  const onChange = fn => global.push(fn);
  return Object.freeze({ S, is, get, go, onEnter, onChange });
})();

/* ══════════════════════════════════════════════════════════
   2. UI CONTROLLER
══════════════════════════════════════════════════════════ */
const UI = (() => {

  // DOM refs
  const $ = id => document.getElementById(id);
  const $$ = sel => document.querySelector(sel);

  const D = {
    frame:    $('phone-frame'),
    btnPow:   $('btn-power'),
    sOff:     $('s-off'),
    sBoot:    $('s-boot'),
    sWelc:    $('s-welcome'),
    bootLogo: $('boot-logo'),
    bootProg: $('boot-prog'),
    bootFill: $('boot-fill'),
    bootLbl:  $('boot-lbl'),
    feedbk:   $('feedback-ov'),
    lpInd:    $('lp-ind'),
    lpFill:   $('lp-fill'),
    bubble:   $('bubble'),
    arrow:    $('arrow'),
    bubbleTxt:$('bubble-txt'),
    btnNext:  $('btn-next'),
  };

  // Mensagens do instrutor
  const MSG = {
    OFF:     { arrow:true,  html:'Toque e <strong>segure</strong> o botão lateral por <strong>3 segundos</strong> para ligar' },
    PRESS:   { arrow:false, html:'✅ Isso! Continue <strong>segurando</strong>...' },
    BOOTING: { arrow:false, html:'✨ Perfeito! O celular está <strong>ligando</strong>...' },
    WELCOME: { arrow:false, html:'🎉 Você <strong>ligou o celular!</strong> Primeiro passo concluído!' },
    ERR_FAST:{ arrow:true,  html:'⚡ Muito rápido! Toque e <strong>segure firme</strong> por 3 segundos' },
    ERR_MED: { arrow:true,  html:'⏱️ Quase! Segure um <strong>pouquinho mais</strong>...' },
    ERR_LONG:{ arrow:true,  html:'👏 Faltou pouco! Segure até a tela <strong>acender</strong>' },
  };

  let feedbackTimer = null;
  let instrTimer    = null;

  // Ativa/desativa camada
  const setActive = (el, on) => el?.classList.toggle('active', on);

  // Instrutor
  const setMsg = (key, delay=0) => {
    if (instrTimer) { clearTimeout(instrTimer); instrTimer = null; }
    const apply = () => {
      const m = MSG[key]; if (!m || !D.bubble) return;
      D.bubbleTxt.innerHTML = m.html;
      D.arrow.style.display = m.arrow ? 'flex' : 'none';
      D.bubble.classList.add('visible');
    };
    delay > 0 ? (instrTimer = setTimeout(apply, delay)) : apply();
  };

  // Atualiza estado visual do botão power
  const setPowerState = (s) => {
    if (!D.btnPow) return;
    D.btnPow.className = '';
    if      (s === 'OFF')     { D.btnPow.classList.add('idle'); D.btnPow.tabIndex = 0; }
    else if (s === 'PRESS')   { D.btnPow.classList.add('pressing'); }
    else                      { D.btnPow.classList.add('locked'); D.btnPow.tabIndex = -1; }
  };

  // Indicador de long-press
  const setLPProgress = (p) => {  // 0.0 → 1.0
    if (!D.lpFill || !D.lpInd) return;
    if (p <= 0) { D.lpInd.classList.remove('vis'); D.lpFill.style.height='0%'; return; }
    D.lpInd.classList.add('vis');
    D.lpFill.style.height = `${p*100}%`;
  };

  // Feedback erro
  const showError = (elapsedMs) => {
    let key, txt;
    if      (elapsedMs < 1000) { key='ERR_FAST'; txt='Tente segurar por mais tempo'; }
    else if (elapsedMs < 2500) { key='ERR_MED';  txt='Quase! Segure mais um pouquinho'; }
    else                       { key='ERR_LONG'; txt='Faltou pouco! Tente mais uma vez'; }

    // Shake háptico visual
    if (D.frame) {
      D.frame.classList.remove('haptic');
      void D.frame.offsetWidth; // force reflow
      D.frame.classList.add('haptic');
      setTimeout(() => D.frame?.classList.remove('haptic'), 400);
    }

    if (D.feedbk) {
      D.feedbk.textContent = txt;
      D.feedbk.classList.add('vis');
      if (feedbackTimer) clearTimeout(feedbackTimer);
      feedbackTimer = setTimeout(() => D.feedbk?.classList.remove('vis'), 2000);
    }
    setMsg(key);
  };

  // Sequência de boot
  const BOOT_SEQ = [
    { t:0,    fn: ()=>{ setActive(D.sOff, false); setActive(D.sBoot, true); }},
    { t:400,  fn: ()=>{ D.bootLogo?.classList.add('vis'); }},
    { t:1300, fn: ()=>{ D.bootProg?.classList.add('vis'); }},
    { t:1600, fn: ()=>{ setFill(30); }},
    { t:2200, fn: ()=>{ setFill(65); }},
    { t:3000, fn: ()=>{ setFill(100); }},
    { t:3500, fn: ()=>{ transitionWelcome(); }},
  ];

  const setFill = (v) => {
    if (D.bootFill) D.bootFill.style.width = v+'%';
    if (D.bootLbl)  D.bootLbl.textContent = `Carregando... ${v}%`;
    // ARIA
    const track = document.querySelector('.boot-track');
    track?.setAttribute('aria-valuenow', v);
  };

  let bootTimers = [];
  const runBoot = () => {
    bootTimers.forEach(clearTimeout); bootTimers = [];
    BOOT_SEQ.forEach(({ t, fn }) => { bootTimers.push(setTimeout(fn, t)); });
  };

  const transitionWelcome = () => {
    FSM.go(FSM.S.WELCOME);
    setActive(D.sBoot, false);
    setTimeout(() => setActive(D.sWelc, true), 280);
  };

  // Bind FSM → UI
  const bindFSM = () => {
    FSM.onEnter(FSM.S.PRESSING, () => {
      setPowerState('PRESS'); setMsg('PRESS');
      D.feedbk?.classList.remove('vis');
    });
    FSM.onEnter(FSM.S.OFF, () => {
      setPowerState('OFF'); setMsg('OFF');
    });
    FSM.onEnter(FSM.S.BOOTING, () => {
      setPowerState('locked'); setMsg('BOOTING');
      setLPProgress(0);
      runBoot();
    });
    FSM.onEnter(FSM.S.WELCOME, () => {
      setPowerState('locked'); setMsg('WELCOME', 700);
    });
  };

  // Botão próximo
  const bindNext = () => {
    if (!D.btnNext) return;
    const handle = (e) => {
      e.preventDefault();
      document.dispatchEvent(new CustomEvent('consysencia:module-complete',
        { detail: { module:'module-0-power-on' } }));
      // Feedback visual imediato
      D.btnNext.innerHTML = '✅ Módulo Concluído!';
      D.btnNext.style.background = '#00C875';
      D.btnNext.style.pointerEvents = 'none';
      D.btnNext.style.animation = 'none';
    };
    D.btnNext.addEventListener('click',   handle);
    D.btnNext.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' ') handle(e); });
  };

  // Init
  const init = () => {
    bindFSM();
    bindNext();
    setActive(D.sOff,  true);
    setActive(D.sBoot, false);
    setActive(D.sWelc, false);
    setPowerState('OFF');
    setTimeout(() => { D.bubble?.classList.add('visible'); setMsg('OFF'); }, 500);
  };

  return Object.freeze({ init, setLPProgress, showError });
})();

/* ══════════════════════════════════════════════════════════
   3. INTERACTION CONTROLLER (Long-Press Detection)
══════════════════════════════════════════════════════════ */
const Input = (() => {
  const HOLD_MS      = 3000;  // duração exigida
  const DEBOUNCE_MS  = 400;   // cooldown pós-release

  let pressStart     = null;
  let isDown         = false;
  let rafId          = null;
  let debounced      = false;
  let activePtr      = null;
  let btnEl          = null;

  // rAF loop — atualiza indicador e detecta conclusão
  const tick = (ts) => {
    if (!isDown || pressStart === null) return;
    const elapsed  = ts - pressStart;
    const progress = Math.min(elapsed / HOLD_MS, 1);
    UI.setLPProgress(progress);

    if (elapsed >= HOLD_MS) { success(); return; }
    rafId = requestAnimationFrame(tick);
  };

  const success = () => {
    cleanup();
    FSM.go(FSM.S.BOOTING);
  };

  const cleanup = () => {
    isDown = false; pressStart = null; activePtr = null;
    if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
    UI.setLPProgress(0);
    debounced = true;
    setTimeout(() => { debounced = false; }, DEBOUNCE_MS);
  };

  const onDown = (e) => {
    if (isDown || debounced) return;
    if (!FSM.is(FSM.S.OFF))  return;
    e.preventDefault();
    activePtr  = e.pointerId ?? null;
    if (activePtr !== null) {
      try { btnEl.setPointerCapture(activePtr); } catch(_){}
    }
    isDown      = true;
    pressStart  = performance.now();
    FSM.go(FSM.S.PRESSING);
    rafId = requestAnimationFrame(tick);
  };

  const onUp = (e) => {
    if (!isDown) return;
    if (activePtr !== null && e.pointerId !== undefined && e.pointerId !== activePtr) return;
    const elapsed = performance.now() - pressStart;
    cleanup();
    if (FSM.is(FSM.S.PRESSING)) {
      FSM.go(FSM.S.OFF);
      UI.showError(elapsed);
    }
  };

  const onMove = (e) => { if (isDown) e.preventDefault(); };

  const init = (btn) => {
    btnEl = btn;
    if (!btnEl) return;
    btnEl.addEventListener('pointerdown',  onDown, { passive:false });
    btnEl.addEventListener('pointerup',    onUp,   { passive:false });
    btnEl.addEventListener('pointerleave', onUp,   { passive:false });
    btnEl.addEventListener('pointercancel',onUp,   { passive:false });
    btnEl.addEventListener('pointermove',  onMove, { passive:false });
    btnEl.addEventListener('contextmenu',  e => e.preventDefault());
  };

  return Object.freeze({ init });
})();

/* ══════════════════════════════════════════════════════════
   4. BOOTSTRAP
══════════════════════════════════════════════════════════ */
(function boot() {
  const run = () => {
    UI.init();
    Input.init(document.getElementById('btn-power'));

    // Suporte teclado: Enter/Space simula hold de 3.1s
    document.getElementById('btn-power')?.addEventListener('keydown', e => {
      if ((e.key === 'Enter' || e.key === ' ') && FSM.is(FSM.S.OFF)) {
        e.preventDefault();
        const btn = e.currentTarget;
        btn.dispatchEvent(new PointerEvent('pointerdown', { pointerId:99, bubbles:true, cancelable:true }));
        setTimeout(() => {
          btn.dispatchEvent(new PointerEvent('pointerup', { pointerId:99, bubbles:true, cancelable:true }));
        }, 3100);
      }
    });

    // Evento de conclusão — SPA principal pode ouvir
    document.addEventListener('consysencia:module-complete', e => {
      console.log('[ConSySenci.a] Módulo concluído:', e.detail);
    });
  };

  document.readyState === 'loading'
    ? document.addEventListener('DOMContentLoaded', run)
    : run();
})();
</script>
