<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ConSySenci.a Rosa - A Caixa Mágica</title>
    <style>
        :root { --rosa-forte: #D81B60; --rosa-fundo: #FCE4EC; --texto-escuro: #1C2833; --botao-verde: #2ECC71; --whatsapp-cor: #25D366; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background-color: var(--rosa-fundo); color: var(--texto-escuro); display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        .cabecalho { display: flex; align-items: center; justify-content: space-between; width: 90%; margin-top: 20px; display: none; }
        .rosa-guia { width: 60px; height: 60px; background: radial-gradient(circle, #FF80AB, var(--rosa-forte)); border-radius: 50% 50% 10% 50%; }
        
        .area-central { flex: 1; display: flex; flex-direction: column; justify-content: center; width: 90%; max-width: 600px; padding-bottom: 80px; }
        .caixa-texto { background-color: white; padding: 30px 20px; border-radius: 24px; box-shadow: 0 6px 20px rgba(0,0,0,0.08); border-left: 12px solid var(--rosa-forte); text-align: center; }

        button.btn-principal { background-color: var(--botao-verde); color: white; border: none; padding: 20px; font-size: 24px; font-weight: bold; border-radius: 50px; width: 100%; cursor: pointer; }
        button.btn-whatsapp { background-color: var(--whatsapp-cor) !important; font-size: 20px; }

        .medalha { font-size: 100px; text-align: center; margin: 20px 0; }
        .escondido { display: none !important; }
    </style>
</head>
<body>

    <div id="tela-inicio" class="area-central">
        <div class="caixa-texto">
            <h1 style="color:var(--rosa-forte); margin-bottom: 20px;">Bem-vindo(a)!</h1>
            <p style="font-size:24px; line-height:1.4;">Toque no botão verde abaixo para ligar a minha voz e começarmos.</p><br>
            <button class="btn-principal" onclick="iniciarAula()">COMEÇAR AULA</button>
        </div>
    </div>

    <div id="cabecalho" class="cabecalho"><div class="rosa-guia"></div><div id="indicador" style="font-weight:bold;">Passo 1/5</div><button class="btn-repetir" onclick="repetirAudio()">🔊</button></div>

    <div id="area-aula" class="area-central escondido"><div class="caixa-texto"><p id="texto-aula" style="font-size:24px;">Olá...</p></div></div>

    <div id="area-quiz" class="area-central escondido">
        <div class="caixa-texto" style="border-left-color: #3498DB;">
            <p id="texto-pergunta" style="font-size:24px; margin-bottom:20px;">Você abriu a janela da Caixa Mágica?</p>
            <div id="botoes-sim-nao" class="area-botoes-quiz"><button class="btn-sim" onclick="responder(true)">SIM</button><button class="btn-nao" onclick="responder(false)">NÃO</button></div>
            
            <div id="area-medalha" class="escondido">
                <div class="medalha">🥇</div>
                <p><b>Você é Campeão(ã)!</b><br>Ganhou a Medalha da Caixa Mágica!</p><br>
                <button class="btn-principal btn-whatsapp" onclick="compartilharVitoriaWhatsApp()">Enviar família no WhatsApp</button>
            </div>
        </div>
    </div>

    <div id="rodape" class="rodape-fixo" style="display:none; position:fixed; bottom:0; left:0; width:100%; padding:15px; background:white;"><button class="btn-principal" onclick="proximoPasso()">PRÓXIMO ➔</button></div>

    <script>
        const roteiro = ["Olá! Nada do que você apertar aqui vai quebrar o aparelho.", "O vidro da frente é a janela do celular.", "A parte de trás tem as câmeras, evite pôr o dedo lá.", "É normal ele esquentar, igual a gente!", "O cabo de carregar é a comida dele."];
        const perguntas = [{texto: "O vidro da frente é a janela do celular?", correta: true}];
        let passoAtual = 0; let pergunAtual = 0; let voz = null;

        function falar(t, c) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'pt-BR'; u.rate = 0.95; u.onend = () => { if(c) c(); }; window.speechSynthesis.speak(u); }
        function iniciarAula() { document.getElementById('tela-inicio').classList.add('escondido'); document.getElementById('cabecalho').style.display = 'flex'; document.getElementById('area-aula').classList.remove('escondido'); document.getElementById('rodape').style.display = 'block'; atualizarTela(); }
        function proximoPasso() { passoAtual++; if(passoAtual < roteiro.length) atualizarTela(); else iniciarQuiz(); }
        function atualizarTela() { const t = roteiro[passoAtual]; document.getElementById('texto-aula').innerText = t; document.getElementById('indicador').innerText = `Passo ${passoAtual+1}/${roteiro.length}`; falar(t); }
        function iniciarQuiz() { document.getElementById('area-aula').classList.add('escondido'); document.getElementById('rodape').style.display = 'none'; document.getElementById('area-quiz').classList.remove('escondido'); falar(perguntas[0].texto); }
        function responder(r) { if(r === perguntas[0].correta) { document.getElementById('botoes-sim-nao').classList.add('escondido'); document.getElementById('area-medalha').classList.remove('escondido'); falar("Parabéns! Você ganhou a medalha. Clique no botão verde para irmos para a Escola de Gestos."); localStorage.setItem('progressoRosa', '1'); } else { falar("Tente de novo!"); } }
        function compartilharVitoriaWhatsApp() { window.open(`https://wa.me/?text=${encodeURIComponent('Ganhei a Medalha da Caixa Mágica! 🥇 Já perdi o medo do celular com a ajuda da Rosa.')}`, '_blank'); setTimeout(() => window.location.href='/gestos/', 3000); }
    </script>
</body>
</html>
