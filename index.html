<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ConSySenci.a Rosa - A Caixa Mágica</title>

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://rosa.consysencia.com/">
    <meta property="og:title" content="Ganhei a Medalha da Caixa Mágica! 🥇">
    <meta property="og:description" content="Perdi o medo do celular com a ajuda da Rosa no projeto ConSySenci.a Rosa. Vem aprender você também!">
    <meta property="og:image" content="https://rosa.consysencia.com/1-medalha.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <style>
        :root {
            --rosa-forte: #D81B60;
            --rosa-fundo: #FCE4EC;
            --texto-escuro: #1C2833;
            --botao-verde: #2ECC71;
            --botao-vermelho: #E74C3C;
            --whatsapp-cor: #25D366;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--rosa-fundo);
            color: var(--texto-escuro);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden; 
        }

        .cabecalho {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 90%;
            margin-top: 20px;
            display: none;
        }

        .rosa-guia {
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #FF80AB, var(--rosa-forte));
            border-radius: 50% 50% 10% 50%;
            box-shadow: 0 4px 10px rgba(216, 27, 96, 0.4);
            animation: respirar 3.5s infinite ease-in-out;
        }

        @keyframes respirar {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .indicador-progresso {
            font-size: 20px;
            color: #666;
            font-weight: bold;
        }

        .btn-repetir {
            background: white;
            border: 2px solid var(--rosa-forte);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        /* Animação para chamar atenção para o botão de áudio */
        .piscar-alerta {
            animation: pulsar-vermelho 1.5s infinite;
        }

        @keyframes pulsar-vermelho {
            0% { box-shadow: 0 0 0 0 rgba(216, 27, 96, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(216, 27, 96, 0); }
            100% { box-shadow: 0 0 0 0 rgba(216, 27, 96, 0); }
        }

        .area-central {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 90%;
            max-width: 600px;
            padding-bottom: 80px; 
        }

        .caixa-texto {
            background-color: white;
            padding: 30px 20px;
            border-radius: 24px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            border-left: 12px solid var(--rosa-forte);
            text-align: center;
        }

        p { font-size: 26px; line-height: 1.4; color: #333; }
        h1 { font-size: 32px; color: var(--rosa-forte); margin-bottom: 20px; }
        h2 { font-size: 28px; color: var(--rosa-forte); margin-bottom: 20px; text-align: center;}

        .rodape-fixo {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            padding: 15px 20px;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.1);
            display: none;
        }

        button.btn-principal {
            background-color: var(--botao-verde);
            color: white;
            border: none;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 50px;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            display: block;
            cursor: pointer;
        }

        button.btn-principal:active { transform: scale(0.96); }

        .btn-whatsapp {
            background-color: var(--whatsapp-cor) !important;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .area-botoes-quiz {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .btn-sim { background-color: var(--botao-verde); flex: 1; padding: 25px; border-radius: 20px; color: white; font-size: 30px; font-weight: bold; border: none; }
        .btn-nao { background-color: var(--botao-vermelho); flex: 1; padding: 25px; border-radius: 20px; color: white; font-size: 30px; font-weight: bold; border: none; }

        .medalha { font-size: 100px; text-align: center; margin: 20px 0; animation: pulo 1s ease-out; }
        @keyframes pulo { 0% { transform: scale(0); } 70% { transform: scale(1.2); } 100% { transform: scale(1); } }

        .escondido { display: none !important; }
        
        /* Classe para impedir cliques duplos/rápidos que cortam o áudio */
        .bloqueado { pointer-events: none; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="tela-inicio" class="area-central">
        <div class="caixa-texto" style="border-left: none;">
            <h1>Bem-vindo(a)!</h1>
            <p>Toque no botão verde abaixo para ligar a minha voz e começarmos.</p>
            <br>
            <button class="btn-principal" onclick="iniciarAula()">COMEÇAR</button>
        </div>
    </div>

    <div id="cabecalho" class="cabecalho">
        <div class="rosa-guia"></div>
        <div id="indicador" class="indicador-progresso">Passo 1/5</div>
        <button id="btn-audio" class="btn-repetir" onclick="repetirAudio()">🔊</button>
    </div>

    <div id="area-aula" class="area-central escondido">
        <div class="caixa-texto">
            <p id="texto-aula">Carregando...</p>
        </div>
    </div>

    <div id="area-quiz" class="area-central escondido">
        <div class="caixa-texto" style="border-left-color: #3498DB;">
            <h2>Jogo da Memória</h2>
            <p id="texto-pergunta">Pergunta vai aqui...</p>
            <div id="botoes-sim-nao" class="area-botoes-quiz">
                <button class="btn-sim" onclick="responder(true)">SIM</button>
                <button class="btn-nao" onclick="responder(false)">NÃO</button>
            </div>
            <div id="area-medalha" class="escondido">
                <div class="medalha">🥇</div>
                <p><b>Você é um(a) Campeão(ã)!</b><br>Ganhou a Medalha da Caixa Mágica!</p>
                <br>
                <button class="btn-principal btn-whatsapp" onclick="compartilharVitoriaWhatsApp()">Enviar pelo WhatsApp</button>
            </div>
        </div>
    </div>

    <div id="rodape" class="rodape-fixo">
        <button id="btn-proximo" class="btn-principal" onclick="proximoPasso()">ENTENDI, PRÓXIMO ➔</button>
    </div>

    <script>
        const roteiro = [
            "Olá! Eu sou a Rosa. Não tenha medo, nada do que você apertar aqui vai quebrar o aparelho. Se você não ouvir direito, aperte no alto-falante que está piscando lá em cima para eu repetir.",
            "O seu aparelho é de vidro e plástico. O vidro que acende é a janela por onde vemos o mundo.",
            "A parte de trás tem as câmeras, que são os olhos dele. Evite colocar o dedo lá para não sujar a visão.",
            "É normal ele esquentar um pouquinho quando trabalha. Igual a gente! Só não abafe ele na coberta.",
            "O cabo de carregar é a comida dele. Use sempre o cabo original para a bateria não viciar."
        ];

        const perguntas = [
            { texto: "O vidro da frente é como se fosse a janela do celular?", correta: true },
            { texto: "É perigoso o celular esquentar um pouquinho enquanto trabalha?", correta: false },
            { texto: "Podemos usar qualquer cabo baratinho para dar energia para ele?", correta: false }
        ];

        let passoAtual = 0;
        let perguntaAtual = 0;
        let vozEscolhida = null;
        let modoQuiz = false;

        function carregarVozes() {
            const vozes = window.speechSynthesis.getVoices();
            vozEscolhida = vozes.find(voz => voz.lang === 'pt-BR' && voz.name.includes('Google')) 
                      || vozes.find(voz => voz.lang === 'pt-BR' && (voz.name.includes('Luciana') || voz.name.includes('Francisca')))
                      || vozes.find(voz => voz.lang.includes('pt-BR')) || vozes[0];
        }

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = carregarVozes;
        } else { carregarVozes(); }

        // Função Falar Ajustada para aceitar um "callback" (esperar terminar)
        function falar(texto, aoTerminar) {
            window.speechSynthesis.cancel(); 
            const utterThis = new SpeechSynthesisUtterance(texto);
            if (vozEscolhida) { utterThis.voice = vozEscolhida; }
            utterThis.lang = 'pt-BR';
            utterThis.rate = 0.95; 
            utterThis.pitch = 1.15; 
            
            utterThis.onend = function(event) {
                if(aoTerminar) aoTerminar();
            };

            window.speechSynthesis.speak(utterThis);
        }

        function iniciarAula() {
            document.getElementById('tela-inicio').classList.add('escondido');
            document.getElementById('cabecalho').style.display = 'flex';
            document.getElementById('area-aula').classList.remove('escondido');
            document.getElementById('rodape').style.display = 'block';
            
            // Faz o botão piscar no primeiro passo
            document.getElementById('btn-audio').classList.add('piscar-alerta');
            
            atualizarTela();
        }

        function repetirAudio() {
            if (modoQuiz) {
                falar(perguntas[perguntaAtual].texto);
            } else {
                falar(roteiro[passoAtual]);
            }
        }

        function proximoPasso() {
            // Remove o piscar do botão de áudio depois do primeiro clique
            if(passoAtual === 0) {
                document.getElementById('btn-audio').classList.remove('piscar-alerta');
            }

            passoAtual++;
            if (passoAtual < roteiro.length) {
                atualizarTela();
            } else {
                iniciarQuiz();
            }
        }

        function atualizarTela() {
            const texto = roteiro[passoAtual];
            document.getElementById('texto-aula').innerText = texto;
            document.getElementById('indicador').innerText = `Passo ${passoAtual + 1}/${roteiro.length}`;
            falar(texto);
        }

        function iniciarQuiz() {
            modoQuiz = true;
            document.getElementById('area-aula').classList.add('escondido');
            document.getElementById('rodape').style.display = 'none'; 
            document.getElementById('area-quiz').classList.remove('escondido');
            mostrarPergunta();
        }

        function mostrarPergunta() {
            document.getElementById('indicador').innerText = `Jogo ${perguntaAtual + 1}/3`;
            const perg = perguntas[perguntaAtual].texto;
            document.getElementById('texto-pergunta').innerText = perg;
            document.getElementById('botoes-sim-nao').classList.remove('bloqueado'); // Libera os botões
            falar("Pergunta: " + perg);
        }

        function responder(respostaUsuario) {
            // Bloqueia os botões para não clicar de novo enquanto a Rosa fala
            document.getElementById('botoes-sim-nao').classList.add('bloqueado');
            
            const correta = perguntas[perguntaAtual].correta;
            if (respostaUsuario === correta) {
                perguntaAtual++;
                if (perguntaAtual < perguntas.length) {
                    // Fala, e só depois de terminar de falar, mostra a próxima pergunta
                    falar("Muito bem, você acertou! Vamos para a próxima.", mostrarPergunta);
                } else {
                    mostrarMedalha();
                }
            } else {
                // Fala, e só depois de terminar de falar, libera os botões de novo
                falar("Ops! Não é bem assim. Vamos ouvir de novo?", function() {
                    document.getElementById('botoes-sim-nao').classList.remove('bloqueado');
                });
            }
        }

        function mostrarMedalha() {
            document.getElementById('indicador').innerText = "Vitória!";
            document.getElementById('botoes-sim-nao').classList.add('escondido');
            document.getElementById('texto-pergunta').classList.add('escondido');
            document.getElementById('area-medalha').classList.remove('escondido');
            falar("Parabéns! Você é um campeão. Acabou de ganhar a medalha da caixa mágica. Compartilhe com sua família!");
        }

        // Compartilha o link "novo" pro WhatsApp baixar a imagem
        function compartilharVitoriaWhatsApp() {
            const texto = 'Ganhei a Medalha da Caixa Mágica! 🥇 Já perdi o medo do celular com a ajuda da Rosa. Vem aprender você também: ';
            const linkSite = 'https://rosa.consysencia.com/?v=1'; 
            
            const urlWhatsApp = `https://wa.me/?text=${encodeURIComponent(texto + linkSite)}`;
            
            window.open(urlWhatsApp, '_blank');
        }
    </script>
</body>
</html>
